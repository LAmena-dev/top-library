<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <script src="./script.js" defer></script>
    <title>Library</title>
</head>

<body>

    <header>
        <h1>Library</h1>
        <button class="openModal">Add Book</button>
    </header>
    <main class="library">
    </main>

    <dialog class="bookForm">
        <button class="closeModal">X</button>
        <h1>Enter book details:</h1>
        <form novalidate>
            <label for="title">* Title:</label>
            <input type="text" id="title" name="book_title" placeholder="Book title..." required>

            <label for="author">* Author:</label>
            <input type="text" id="author" name="book_author" placeholder="Book author..." required>

            <label for="genre">Genre:</label>
            <input type="text" id="genre" name="book_genre" placeholder="Book genre...">

            <label for="pages">* No. of Pages:</label>
            <input type="number" id="pages" name="book_pages" placeholder="Number of pages..." required min="1">

            <label for="read">Read?:<input type="checkbox" id="read" name="book_read"></label>
            <button type="submit" class="addBook">Submit</button>
        </form>
    </dialog>

</body>

</html>
